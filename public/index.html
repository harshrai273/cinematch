<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>CineMatch</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:      #090909;
      --bg2:     #121212;
      --bg3:     #1c1c1c;
      --border:  rgba(255,255,255,0.08);
      --red:     #e8272e;
      --orange:  #ff6b35;
      --gold:    #f5c842;
      --green:   #22c55e;
      --blue:    #3b82f6;
      --text:    #f0f0f0;
      --muted:   #666;
      --muted2:  #333;
      --nav-h:   56px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: calc(var(--nav-h) + 16px);
    }
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-thumb { background: var(--muted2); }

    /* ═══════════ AUTH ═══════════ */
    #auth-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background:
        radial-gradient(ellipse 90% 60% at 10% 50%, rgba(232,39,46,.15) 0%, transparent 60%),
        radial-gradient(ellipse 60% 80% at 90% 20%, rgba(255,107,53,.08) 0%, transparent 60%),
        var(--bg);
    }
    .auth-box {
      width: 100%;
      max-width: 400px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 36px 28px;
      box-shadow: 0 40px 80px rgba(0,0,0,.6);
      animation: fadeUp .35s ease;
    }
    @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
    .auth-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 32px;
      letter-spacing: 6px;
      color: var(--red);
      margin-bottom: 4px;
    }
    .auth-sub { font-size: 12px; color: var(--muted); margin-bottom: 24px; font-weight: 300; }
    .auth-tabs {
      display: flex; gap: 4px;
      background: var(--bg);
      border-radius: 10px; padding: 4px;
      margin-bottom: 20px;
    }
    .auth-tab {
      flex: 1; padding: 9px; border: none; border-radius: 7px;
      background: transparent; color: var(--muted);
      font-family: 'DM Sans', sans-serif; font-size: 11px;
      font-weight: 700; letter-spacing: 1.5px; cursor: pointer; transition: all .2s;
    }
    .auth-tab.active { background: var(--red); color: #fff; }
    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 10px; letter-spacing: 2px; color: var(--muted); margin-bottom: 6px; font-weight: 600; }
    .field input {
      width: 100%; padding: 12px 14px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 9px; color: var(--text);
      font-family: 'DM Sans', sans-serif; font-size: 14px;
      outline: none; transition: border-color .2s;
    }
    .field input:focus { border-color: var(--red); }
    .field input::placeholder { color: var(--muted2); }
    .btn-primary {
      width: 100%; padding: 13px; background: var(--red); border: none;
      border-radius: 9px; color: #fff; font-family: 'DM Sans', sans-serif;
      font-size: 12px; font-weight: 700; letter-spacing: 2px; cursor: pointer; transition: all .2s; margin-top: 4px;
    }
    .btn-primary:hover { background: #c41f25; }
    .err-msg { font-size: 12px; color: #f87171; text-align: center; min-height: 18px; margin-top: 10px; }

    /* ═══════════ APP ═══════════ */
    #app-screen { display: none; }

    /* Top bar */
    .topbar {
      position: sticky; top: 0; z-index: 50;
      background: rgba(9,9,9,.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center;
      padding: 0 16px; height: 52px; gap: 12px;
    }
    .topbar-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px; letter-spacing: 4px; color: var(--red);
    }
    .topbar-search {
      flex: 1; display: flex; gap: 8px;
    }
    .topbar-input {
      flex: 1; padding: 8px 14px;
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text);
      font-family: 'DM Sans', sans-serif; font-size: 13px; outline: none;
      transition: border-color .2s;
    }
    .topbar-input:focus { border-color: var(--red); }
    .topbar-input::placeholder { color: var(--muted); }
    .topbar-btn {
      padding: 8px 14px; background: var(--red); border: none;
      border-radius: 8px; color: #fff; font-size: 13px;
      font-weight: 700; cursor: pointer; white-space: nowrap;
    }
    .user-chip {
      display: flex; align-items: center; gap: 8px;
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 20px; padding: 4px 10px 4px 4px;
      cursor: pointer;
    }
    .user-chip-avatar {
      width: 28px; height: 28px; border-radius: 50%;
      background: linear-gradient(135deg, var(--red), var(--orange));
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700;
    }
    .user-chip-name { font-size: 12px; font-weight: 600; max-width: 80px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* Bottom nav */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: var(--nav-h);
      background: rgba(9,9,9,.95);
      backdrop-filter: blur(12px);
      border-top: 1px solid var(--border);
      display: flex; z-index: 50;
    }
    .bnav-btn {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 3px; border: none; background: transparent;
      color: var(--muted); font-family: 'DM Sans', sans-serif;
      font-size: 9px; font-weight: 600; letter-spacing: 1px;
      cursor: pointer; transition: color .2s; position: relative;
    }
    .bnav-btn.active { color: var(--red); }
    .bnav-icon { font-size: 20px; line-height: 1; }
    .bnav-badge {
      position: absolute; top: 6px; right: calc(50% - 18px);
      background: var(--red); color: #fff;
      font-size: 9px; font-weight: 700; padding: 1px 5px;
      border-radius: 8px; min-width: 16px; text-align: center;
      display: none;
    }

    /* Views */
    .view { display: none; padding: 16px; animation: fadeIn .2s ease; max-width: 900px; margin: 0 auto; }
    .view.active { display: block; }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }

    /* Section heading */
    .sec-head {
      display: flex; align-items: baseline; gap: 10px;
      margin-bottom: 14px;
    }
    .sec-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px; letter-spacing: 2px;
    }
    .sec-title span { color: var(--red); }
    .sec-sub { font-size: 11px; color: var(--muted); font-weight: 300; }

    /* Movie grid */
    .movie-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 12px;
    }
    .movie-card {
      background: var(--bg2);
      border-radius: 10px; overflow: hidden;
      border: 1px solid var(--border);
      cursor: pointer; transition: transform .2s, box-shadow .2s;
    }
    .movie-card:hover { transform: translateY(-4px); box-shadow: 0 12px 30px rgba(0,0,0,.5); }
    .card-poster {
      width: 100%; aspect-ratio: 2/3; object-fit: cover;
      display: block; background: var(--bg3);
    }
    .card-body { padding: 10px; }
    .card-title { font-size: 12px; font-weight: 600; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-year { font-size: 10px; color: var(--muted); margin-bottom: 8px; }
    .card-rating { color: var(--gold); font-size: 10px; font-weight: 600; }

    /* Action buttons */
    .action-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
    .action-btn {
      padding: 5px 2px; border-radius: 5px;
      border: 1px solid var(--border); background: transparent;
      color: var(--muted); font-family: 'DM Sans', sans-serif;
      font-size: 9px; font-weight: 700; cursor: pointer; transition: all .12s; letter-spacing: .3px;
    }
    .action-btn:hover { background: var(--bg3); color: var(--text); }
    .action-btn.liked    { border-color: #ef4444; color: #ef4444; background: rgba(239,68,68,.1); }
    .action-btn.watched  { border-color: var(--green); color: var(--green); background: rgba(34,197,94,.1); }
    .action-btn.disliked { border-color: var(--muted); color: var(--muted); background: rgba(100,116,139,.1); }
    .action-btn.skipped  { border-color: var(--gold); color: var(--gold); background: rgba(245,200,66,.1); }

    /* Match bar */
    .match-wrap { margin-bottom: 7px; }
    .match-top { display: flex; justify-content: space-between; font-size: 8px; letter-spacing: 1px; color: var(--muted); margin-bottom: 3px; font-weight: 700; }
    .match-pct.h { color: var(--green); }
    .match-pct.m { color: var(--gold); }
    .match-pct.l { color: var(--red); }
    .match-bg { height: 2px; background: var(--bg3); border-radius: 1px; }
    .match-fill { height: 2px; border-radius: 1px; }
    .match-fill.h { background: var(--green); }
    .match-fill.m { background: var(--gold); }
    .match-fill.l { background: var(--red); }

    /* Stream badges */
    .stream-row { display: flex; gap: 3px; flex-wrap: wrap; margin-top: 6px; }
    .stream-badge { font-size: 8px; padding: 2px 5px; border-radius: 3px; background: var(--bg3); color: var(--muted); border: 1px solid var(--border); }

    /* Spinner */
    .spinner { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 12px; letter-spacing: 2px; }
    .spinner::after { content:''; display:block; width:28px; height:28px; border:2px solid var(--border); border-top-color:var(--red); border-radius:50%; margin:12px auto 0; animation:spin .8s linear infinite; }
    @keyframes spin { to{transform:rotate(360deg)} }

    /* Empty state */
    .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
    .empty-icon { font-size: 40px; margin-bottom: 12px; opacity: .4; }
    .empty-text { font-size: 13px; font-weight: 300; }

    /* Stats */
    .stats-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-bottom: 24px; }
    .stat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 14px 10px; text-align: center; }
    .stat-icon { font-size: 20px; margin-bottom: 6px; }
    .stat-num { font-family: 'Bebas Neue', sans-serif; font-size: 28px; line-height: 1; }
    .stat-label { font-size: 9px; color: var(--muted); letter-spacing: 1.5px; margin-top: 3px; font-weight: 600; }

    /* Taste bars */
    .taste-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px,1fr)); gap: 10px; margin-bottom: 24px; }
    .taste-item { background: var(--bg2); border: 1px solid var(--border); border-radius: 9px; padding: 12px 14px; }
    .taste-label { font-size: 12px; font-weight: 600; margin-bottom: 7px; }
    .taste-bg { height: 3px; background: var(--bg3); border-radius: 2px; }
    .taste-fill { height: 3px; border-radius: 2px; transition: width .5s; }
    .taste-pts { font-size: 10px; color: var(--red); margin-top: 5px; font-weight: 700; }

    /* Friend rows */
    .user-list { display: flex; flex-direction: column; gap: 8px; }
    .user-row {
      display: flex; align-items: center; gap: 10px;
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 14px;
    }
    .u-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: linear-gradient(135deg, var(--red), var(--orange));
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700; flex-shrink: 0;
    }
    .u-name { font-size: 13px; font-weight: 600; flex: 1; }
    .btn-sm {
      padding: 6px 12px; border-radius: 6px;
      border: 1px solid var(--border); background: transparent;
      color: var(--muted); font-family: 'DM Sans', sans-serif;
      font-size: 11px; font-weight: 600; cursor: pointer; transition: all .15s; white-space: nowrap;
    }
    .btn-sm:hover { background: var(--bg3); color: var(--text); }
    .btn-sm.g { border-color: var(--green); color: var(--green); }
    .btn-sm.g:hover { background: rgba(34,197,94,.1); }
    .btn-sm.r { border-color: var(--red); color: var(--red); }
    .btn-sm.r:hover { background: rgba(232,39,46,.1); }
    .btn-sm.b { border-color: var(--blue); color: var(--blue); }
    .btn-sm.b:hover { background: rgba(59,130,246,.1); }

    /* My list groups */
    .list-group { margin-bottom: 28px; }
    .list-group-head { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
    .list-group-title { font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 2px; }
    .list-group-count { font-size: 10px; color: var(--muted); background: var(--bg3); padding: 2px 7px; border-radius: 8px; }

    /* Rec basis chip */
    .rec-chip { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; color: var(--muted); background: var(--bg2); border: 1px solid var(--border); border-radius: 20px; padding: 4px 12px; margin-bottom: 14px; }

    /* Toast */
    #toast {
      position: fixed; bottom: 70px; left: 50%; transform: translateX(-50%);
      padding: 10px 20px; background: var(--bg2);
      border-left: 3px solid var(--red); border-radius: 8px;
      font-size: 13px; font-weight: 500; display: none; z-index: 999;
      white-space: nowrap; box-shadow: 0 8px 24px rgba(0,0,0,.5);
      animation: slideUp .2s ease;
    }
    @keyframes slideUp { from{opacity:0;transform:translateX(-50%) translateY(8px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }

    /* ═══════════ MODAL ═══════════ */
    #modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.88); z-index: 200;
      align-items: flex-end; justify-content: center;
      backdrop-filter: blur(4px);
    }
    #modal-overlay.open { display: flex; }

    .modal {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 20px 20px 0 0;
      width: 100%; max-width: 680px;
      max-height: 92vh; overflow-y: auto;
      animation: slideModal .3s ease;
    }
    @keyframes slideModal { from{transform:translateY(60px);opacity:0} to{transform:translateY(0);opacity:1} }

    .modal-banner {
      position: relative; width: 100%; height: 220px; overflow: hidden;
      border-radius: 20px 20px 0 0;
    }
    .modal-banner img { width: 100%; height: 100%; object-fit: cover; object-position: top; display: block; }
    .modal-banner-gradient {
      position: absolute; inset: 0;
      background: linear-gradient(to bottom, transparent 30%, var(--bg2));
    }
    .modal-close {
      position: absolute; top: 12px; right: 12px;
      width: 32px; height: 32px; border-radius: 50%;
      background: rgba(0,0,0,.7); border: 1px solid var(--border);
      color: var(--text); font-size: 14px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .modal-body { padding: 4px 20px 24px; }
    .modal-title { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 2px; margin-bottom: 6px; }
    .modal-meta { display: flex; flex-wrap: wrap; gap: 10px; font-size: 12px; color: var(--muted); margin-bottom: 12px; }
    .modal-meta span { display: flex; align-items: center; gap: 3px; }
    .modal-plot { font-size: 13px; line-height: 1.7; color: #aaa; font-weight: 300; margin-bottom: 16px; }
    .modal-cast { font-size: 12px; color: var(--muted); margin-bottom: 16px; }
    .modal-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
    .modal-action-btn {
      padding: 9px 18px; border-radius: 8px;
      border: 1px solid var(--border); background: transparent;
      color: var(--muted); font-family: 'DM Sans', sans-serif;
      font-size: 12px; font-weight: 700; cursor: pointer; transition: all .15s;
    }
    .modal-action-btn:hover { background: var(--bg3); color: var(--text); }
    .modal-action-btn.liked    { border-color: #ef4444; color: #ef4444; background: rgba(239,68,68,.1); }
    .modal-action-btn.watched  { border-color: var(--green); color: var(--green); background: rgba(34,197,94,.1); }
    .modal-action-btn.disliked { border-color: var(--muted); color: var(--muted); background: rgba(100,116,139,.1); }
    .modal-action-btn.skipped  { border-color: var(--gold); color: var(--gold); background: rgba(245,200,66,.1); }

    .modal-section-title { font-size: 10px; letter-spacing: 2.5px; color: var(--muted); font-weight: 700; margin-bottom: 12px; }
    .similar-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px,1fr)); gap: 10px; }
    .similar-card { cursor: pointer; }
    .similar-card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; border-radius: 8px; display: block; background: var(--bg3); margin-bottom: 6px; }
    .similar-card-title { font-size: 11px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .similar-card-year { font-size: 10px; color: var(--muted); }

    /* Horizontal scroll row */
    .scroll-row { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 8px; scrollbar-width: none; }
    .scroll-row::-webkit-scrollbar { display: none; }
    .scroll-card { flex-shrink: 0; width: 120px; cursor: pointer; }
    .scroll-card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; border-radius: 8px; display: block; background: var(--bg3); margin-bottom: 6px; border: 1px solid var(--border); }
    .scroll-card-title { font-size: 11px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .scroll-card-year { font-size: 10px; color: var(--muted); }

    /* Section spacing */
    .section { margin-bottom: 28px; }
  </style>
</head>
<body>

<!-- ═══════════ AUTH ═══════════ -->
<div id="auth-screen">
  <div class="auth-box">
    <div class="auth-logo">CINEMATCH</div>
    <div class="auth-sub">Your next obsession, personalised.</div>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">SIGN IN</button>
      <button class="auth-tab" onclick="switchTab('signup')">JOIN FREE</button>
    </div>
    <div id="login-form">
      <div class="field"><label>EMAIL</label><input type="email" id="login-email" placeholder="you@example.com"/></div>
      <div class="field"><label>PASSWORD</label><input type="password" id="login-password" placeholder="••••••••"/></div>
      <button class="btn-primary" onclick="login()">SIGN IN →</button>
      <div class="err-msg" id="login-error"></div>
    </div>
    <div id="signup-form" style="display:none">
      <div class="field"><label>USERNAME</label><input type="text" id="signup-username" placeholder="choose a username"/></div>
      <div class="field"><label>EMAIL</label><input type="email" id="signup-email" placeholder="you@example.com"/></div>
      <div class="field"><label>PASSWORD</label><input type="password" id="signup-password" placeholder="min 4 characters"/></div>
      <div class="field"><label>CONFIRM</label><input type="password" id="signup-confirm" placeholder="••••••••"/></div>
      <button class="btn-primary" onclick="register()">CREATE ACCOUNT →</button>
      <div class="err-msg" id="signup-error"></div>
    </div>
  </div>
</div>

<!-- ═══════════ APP ═══════════ -->
<div id="app-screen">

  <!-- Top bar -->
  <div class="topbar">
    <div class="topbar-logo">CM</div>
    <div class="topbar-search">
      <input class="topbar-input" id="search-input" placeholder="Search movies, shows..."
        onkeydown="if(event.key==='Enter') doSearch()"/>
      <button class="topbar-btn" onclick="doSearch()">GO</button>
    </div>
    <div class="user-chip" onclick="showView('profile')">
      <div class="user-chip-avatar" id="top-avatar">?</div>
      <span class="user-chip-name" id="top-username"></span>
    </div>
  </div>

  <!-- Views -->
  <div id="view-home" class="view active">
    <div class="section">
      <div class="sec-head"><div class="sec-title">DISCOVER <span>FILMS</span></div></div>
      <div id="home-results" class="movie-grid"><div class="spinner">LOADING</div></div>
    </div>
  </div>

  <div id="view-search" class="view">
    <div class="sec-head"><div class="sec-title">SEARCH <span>RESULTS</span></div><div class="sec-sub" id="search-label"></div></div>
    <div id="search-results" class="movie-grid"></div>
  </div>

  <div id="view-foryou" class="view">
    <div class="sec-head"><div class="sec-title">FOR <span>YOU</span></div></div>
    <div id="rec-chip"></div>
    <div id="rec-results" class="movie-grid"></div>
  </div>

  <div id="view-mylist" class="view">
    <div class="sec-head"><div class="sec-title">MY <span>LIST</span></div></div>
    <div id="mylist-content"></div>
  </div>

  <div id="view-friends" class="view">
    <div class="sec-head"><div class="sec-title">FRIENDS</div></div>
    <div style="display:flex;gap:8px;margin-bottom:16px">
      <input class="topbar-input" id="user-search-input" placeholder="Find by username..." onkeydown="if(event.key==='Enter') searchUsers()" style="flex:1"/>
      <button class="topbar-btn" onclick="searchUsers()">FIND</button>
    </div>
    <div id="user-search-results" class="user-list" style="margin-bottom:16px"></div>
    <div id="friend-requests-section"></div>
    <div style="font-size:10px;letter-spacing:2px;color:var(--muted);font-weight:700;margin:16px 0 10px">MY FRIENDS</div>
    <div id="friends-list" class="user-list"></div>
  </div>

  <div id="view-profile" class="view">
