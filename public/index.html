<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Movie Recommendation App</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #0f0f0f; color: #eee; min-height: 100vh; }

    /* ── Auth ── */
    #auth-screen { display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
    .auth-box { background: #1a1a1a; border-radius: 12px; padding: 32px; width: 100%; max-width: 400px; }
    .auth-box h1 { text-align: center; margin-bottom: 24px; color: #e50914; font-size: 28px; }
    .auth-tabs { display: flex; margin-bottom: 20px; border-radius: 8px; overflow: hidden; border: 1px solid #333; }
    .auth-tab { flex: 1; padding: 10px; border: none; cursor: pointer; background: transparent; color: #888; font-weight: 600; font-size: 13px; letter-spacing: 1px; transition: all .2s; }
    .auth-tab.active { background: #e50914; color: white; }
    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 11px; color: #888; margin-bottom: 5px; letter-spacing: 1px; }
    .field input { width: 100%; padding: 10px 12px; border-radius: 7px; border: 1px solid #333; background: #111; color: #eee; font-size: 14px; outline: none; }
    .field input:focus { border-color: #e50914; }
    .btn { width: 100%; padding: 12px; border-radius: 8px; border: none; cursor: pointer; font-size: 14px; font-weight: 700; letter-spacing: 1px; margin-top: 6px; }
    .btn-red { background: #e50914; color: white; }
    .btn-red:hover { background: #c40812; }
    .error-msg { color: #f87171; font-size: 12px; margin-top: 8px; text-align: center; min-height: 18px; }

    /* ── App ── */
    #app-screen { display: none; }
    nav { background: #111; border-bottom: 1px solid #222; padding: 0 20px; display: flex; align-items: center; gap: 16px; height: 54px; position: sticky; top: 0; z-index: 10; }
    nav h2 { color: #e50914; font-size: 20px; letter-spacing: 2px; }
    .nav-links { display: flex; gap: 4px; }
    .nav-link { background: transparent; border: none; color: #888; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600; transition: all .15s; }
    .nav-link.active, .nav-link:hover { background: rgba(229,9,20,.12); color: #e50914; }
    .nav-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
    .nav-user { font-size: 13px; color: #aaa; }
    .btn-sm { padding: 6px 14px; border-radius: 6px; border: 1px solid #333; background: transparent; color: #888; cursor: pointer; font-size: 12px; }
    .btn-sm:hover { background: #222; color: #eee; }

    /* ── Views ── */
    .view { display: none; padding: 24px 20px; max-width: 1200px; margin: 0 auto; }
    .view.active { display: block; }

    /* ── Search bar ── */
    .search-bar { display: flex; gap: 10px; margin-bottom: 24px; }
    .search-bar input { flex: 1; padding: 10px 14px; border-radius: 8px; border: 1px solid #333; background: #1a1a1a; color: #eee; font-size: 14px; outline: none; }
    .search-bar input:focus { border-color: #e50914; }
    .search-bar button { padding: 10px 20px; background: #e50914; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 700; }

    /* ── Movie grid ── */
    .movie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 16px; }
    .movie-card { background: #1a1a1a; border-radius: 10px; overflow: hidden; transition: transform .2s; cursor: pointer; border: 1px solid #222; }
    .movie-card:hover { transform: translateY(-4px); border-color: #444; }
    .movie-card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; background: #222; display: block; }
    .movie-card-info { padding: 10px; }
    .movie-card-title { font-size: 13px; font-weight: 600; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .movie-card-year { font-size: 11px; color: #888; margin-bottom: 8px; }
    .action-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
    .action-btn { padding: 5px; border: 1px solid #333; background: transparent; color: #aaa; border-radius: 4px; cursor: pointer; font-size: 10px; transition: all .12s; }
    .action-btn:hover { background: #333; color: #fff; }
    .action-btn.liked { border-color: #ef4444; color: #ef4444; background: rgba(239,68,68,.1); }
    .action-btn.watched { border-color: #22c55e; color: #22c55e; background: rgba(34,197,94,.1); }
    .action-btn.disliked { border-color: #64748b; color: #64748b; background: rgba(100,116,139,.1); }
    .action-btn.skipped { border-color: #eab308; color: #eab308; background: rgba(234,179,8,.1); }

    /* ── Friends ── */
    .section-title { font-size: 13px; letter-spacing: 2px; color: #888; margin-bottom: 14px; font-weight: 700; }
    .user-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 24px; }
    .user-row { display: flex; align-items: center; gap: 12px; background: #1a1a1a; padding: 12px 16px; border-radius: 8px; border: 1px solid #222; }
    .user-avatar { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, #e50914, #7c3aed); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; flex-shrink: 0; }
    .user-name { font-size: 14px; font-weight: 600; flex: 1; }
    .badge { font-size: 10px; padding: 2px 8px; border-radius: 10px; background: #e50914; color: white; font-weight: 700; }
    .empty-state { text-align: center; padding: 60px 20px; color: #555; }
    .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; }

    /* ── Taste profile ── */
    .taste-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; margin-bottom: 24px; }
    .taste-item { background: #1a1a1a; border-radius: 8px; padding: 12px; border: 1px solid #222; }
    .taste-label { font-size: 11px; color: #888; margin-bottom: 6px; }
    .taste-bar-bg { height: 4px; background: #333; border-radius: 2px; }
    .taste-bar { height: 4px; background: #e50914; border-radius: 2px; transition: width .4s; }
    .taste-score { font-size: 18px; font-weight: 700; color: #e50914; }

    /* ── Toast ── */
    #toast { position: fixed; bottom: 20px; right: 20px; padding: 12px 20px; background: #222; border-left: 3px solid #e50914; border-radius: 6px; font-size: 13px; display: none; z-index: 999; animation: slideIn .2s ease; }
    @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .spinner { text-align: center; padding: 40px; color: #555; font-size: 14px; }
    h3.section-h { font-size: 16px; margin-bottom: 16px; color: #eee; }
  </style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen">
  <div class="auth-box">
    <h1>🎬 CINEMATCH</h1>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">SIGN IN</button>
      <button class="auth-tab" onclick="switchTab('signup')">SIGN UP</button>
    </div>
    <!-- Login -->
    <div id="login-form">
      <div class="field"><label>EMAIL</label><input type="email" id="login-email" placeholder="you@email.com"/></div>
      <div class="field"><label>PASSWORD</label><input type="password" id="login-password" placeholder="••••••••"/></div>
      <button class="btn btn-red" onclick="login()">SIGN IN</button>
      <div class="error-msg" id="login-error"></div>
    </div>
    <!-- Signup -->
    <div id="signup-form" style="display:none">
      <div class="field"><label>USERNAME</label><input type="text" id="signup-username" placeholder="choose_username"/></div>
      <div class="field"><label>EMAIL</label><input type="email" id="signup-email" placeholder="you@email.com"/></div>
      <div class="field"><label>PASSWORD</label><input type="password" id="signup-password" placeholder="min 4 characters"/></div>
      <div class="field"><label>CONFIRM PASSWORD</label><input type="password" id="signup-confirm" placeholder="••••••••"/></div>
      <button class="btn btn-red" onclick="register()">CREATE ACCOUNT</button>
      <div class="error-msg" id="signup-error"></div>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app-screen">
  <nav>
    <h2>CINEMATCH</h2>
    <div class="nav-links">
      <button class="nav-link active" onclick="showView('search')">🔍 Search</button>
      <button class="nav-link" onclick="showView('recommendations')">✦ For You</button>
      <button class="nav-link" onclick="showView('mylist')">📋 My List</button>
      <button class="nav-link" onclick="showView('friends')">👥 Friends</button>
      <button class="nav-link" onclick="showView('profile')">👤 Profile</button>
    </div>
    <div class="nav-right">
      <span class="nav-user" id="nav-username"></span>
      <button class="btn-sm" onclick="logout()">Logout</button>
    </div>
  </nav>

  <!-- SEARCH VIEW -->
  <div id="view-search" class="view active">
    <div class="search-bar">
      <input id="search-input" placeholder="Search any movie or show..." onkeydown="if(event.key==='Enter') searchMovies()"/>
      <button onclick="searchMovies()">SEARCH</button>
    </div>
    <div id="search-results" class="movie-grid"></div>
  </div>

  <!-- RECOMMENDATIONS VIEW -->
  <div id="view-recommendations" class="view">
    <h3 class="section-h">✦ Recommended For You</h3>
    <div id="rec-basis" style="font-size:12px;color:#888;margin-bottom:16px;"></div>
    <div id="rec-results" class="movie-grid"></div>
  </div>

  <!-- MY LIST VIEW -->
  <div id="view-mylist" class="view">
    <h3 class="section-h">📋 My Watch History</h3>
    <div id="mylist-content"></div>
  </div>

  <!-- FRIENDS VIEW -->
  <div id="view-friends" class="view">
    <!-- Search users -->
    <h3 class="section-h">👥 Friends</h3>
    <div class="search-bar">
      <input id="user-search-input" placeholder="Find users by username..." onkeydown="if(event.key==='Enter') searchUsers()"/>
      <button onclick="searchUsers()">FIND</button>
    </div>
    <div id="user-search-results" class="user-list"></div>
    <!-- Pending requests -->
    <div id="friend-requests-section"></div>
    <!-- My friends -->
    <div class="section-title">MY FRIENDS</div>
    <div id="friends-list" class="user-list"></div>
  </div>

  <!-- PROFILE VIEW -->
  <div id="view-profile" class="view">
    <h3 class="section-h">👤 My Profile</h3>
    <div id="profile-content"></div>
  </div>
</div>

<div id="toast"></div>

<script src="app.js"></script>
</body>
</html>
