<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>CineMatch</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0a;--bg2:#111;--bg3:#1a1a1a;--bg4:#222;
  --border:#2a2a2a;--text:#e8e8e8;--muted:#888;--dim:#555;
  --red:#e50914;--green:#22c55e;--yellow:#eab308;--blue:#3b82f6;
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
input,button,select{font-family:inherit}
button{cursor:pointer;border:none;outline:none;transition:all .18s}
input{outline:none}
img{display:block}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:#333;border-radius:3px}

/* ── AUTH ─────────────────────────────────────────────────────────────────── */
#auth-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;
  background:radial-gradient(ellipse at 50% 0%,rgba(229,9,20,.15) 0%,transparent 60%),var(--bg)}
.auth-box{background:rgba(15,15,15,.98);border:1px solid #2a2a2a;border-radius:16px;
  padding:40px 36px;width:100%;max-width:420px;box-shadow:0 24px 60px rgba(0,0,0,.8)}
.auth-logo{font-size:28px;font-weight:900;letter-spacing:2px;color:var(--red);margin-bottom:6px}
.auth-sub{color:var(--muted);font-size:13px;margin-bottom:28px}
.auth-tabs{display:flex;background:#1a1a1a;border-radius:10px;padding:3px;margin-bottom:24px;gap:3px}
.auth-tab{flex:1;padding:9px;border-radius:8px;background:transparent;color:var(--muted);font-weight:600;font-size:13px;transition:all .2s}
.auth-tab.active{background:var(--red);color:#fff}
.auth-form{display:none}
.field-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--dim);margin-bottom:6px}
.field-input{width:100%;background:#1a1a1a;border:1px solid var(--border);border-radius:9px;
  padding:12px 14px;color:var(--text);font-size:14px;transition:border-color .2s;margin-bottom:14px}
.field-input:focus{border-color:var(--red)}
.auth-btn{width:100%;padding:13px;background:var(--red);color:#fff;font-weight:700;font-size:15px;border-radius:10px;margin-top:4px}
.auth-btn:hover{background:#ff1a1a}
.auth-error{color:#f87171;font-size:12px;margin-top:-8px;margin-bottom:10px;min-height:18px}
.auth-switch{margin-top:16px;text-align:center;color:var(--muted);font-size:13px}
.auth-switch span{color:var(--red);cursor:pointer;font-weight:600}

/* ── APP ──────────────────────────────────────────────────────────────────── */
#app-screen{display:none}
.navbar{position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:4px;
  padding:0 20px;height:56px;background:rgba(10,10,10,.97);
  border-bottom:1px solid var(--border);backdrop-filter:blur(16px)}
.nav-logo{font-size:20px;font-weight:900;letter-spacing:2px;color:var(--red);margin-right:12px;flex-shrink:0}
.nav-link{padding:7px 13px;border-radius:8px;background:transparent;color:var(--muted);font-size:13px;font-weight:500}
.nav-link:hover{background:#1a1a1a;color:var(--text)}
.nav-link.active{background:rgba(229,9,20,.15);color:var(--red);font-weight:700}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.nav-user{font-size:13px;color:var(--muted);display:flex;align-items:center;gap:7px}
.nav-avatar{width:28px;height:28px;border-radius:50%;background:var(--red);
  display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff}
.nav-logout{padding:6px 12px;background:#1a1a1a;color:var(--muted);border-radius:7px;font-size:12px}
.nav-logout:hover{color:var(--red)}

/* ── VIEWS ────────────────────────────────────────────────────────────────── */
.view{display:none;padding:24px 20px;max-width:1300px;margin:0 auto;animation:fadeIn .25s ease}
.view.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.view-title{font-size:22px;font-weight:800;letter-spacing:.5px;margin-bottom:4px}
.view-title span{color:var(--red)}
.section-title{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:2px;
  color:var(--muted);margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--border)}

/* ── SEARCH ───────────────────────────────────────────────────────────────── */
.search-bar{display:flex;gap:8px;margin-bottom:24px}
.search-input{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:10px;
  padding:12px 16px;color:var(--text);font-size:15px}
.search-input:focus{border-color:var(--red)}
.search-btn{padding:12px 24px;background:var(--red);color:#fff;border-radius:10px;font-weight:700;font-size:14px}
.search-btn:hover{background:#ff1a1a}

/* ── MOVIE GRID + CARDS ───────────────────────────────────────────────────── */
.movie-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px}
.movie-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;
  overflow:hidden;transition:all .2s;display:flex;flex-direction:column}
.movie-card:hover{border-color:#3a3a3a;transform:translateY(-3px);box-shadow:0 12px 36px rgba(0,0,0,.6)}
.movie-poster-wrap{position:relative;flex-shrink:0;cursor:pointer}
.movie-poster-wrap img{width:100%;height:200px;object-fit:cover;background:#1a1a1a;display:block}
.imdb-badge{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.85);
  color:#f5c518;font-size:11px;font-weight:800;padding:3px 8px;border-radius:6px}
.type-badge{position:absolute;top:8px;left:8px;background:rgba(59,130,246,.9);
  color:#fff;font-size:9px;font-weight:800;padding:2px 7px;border-radius:5px;letter-spacing:.8px}
.poster-overlay{position:absolute;inset:0;background:rgba(0,0,0,0);display:flex;align-items:center;
  justify-content:center;transition:background .2s;font-size:32px;opacity:0}
.movie-poster-wrap:hover .poster-overlay{background:rgba(0,0,0,.55);opacity:1}
.movie-card-info{padding:12px;display:flex;flex-direction:column;gap:7px;flex:1}
.movie-card-title{font-size:14px;font-weight:700;line-height:1.3;cursor:pointer;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.movie-card-title:hover{color:var(--red)}
.movie-card-meta{display:flex;flex-wrap:wrap;align-items:center;gap:6px;font-size:12px;color:var(--muted)}
.genre-tag{background:rgba(229,9,20,.12);color:var(--red);padding:2px 8px;
  border-radius:20px;font-size:10px;font-weight:700;white-space:nowrap}
.movie-plot{font-size:12px;color:#777;line-height:1.6;
  display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;
  overflow:hidden;line-clamp:3}
.match-bar-wrap{margin-top:2px}
.match-bar-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--dim);margin-bottom:3px}
.match-bar-bg{height:3px;background:#2a2a2a;border-radius:2px}
.match-bar-fill{height:3px;border-radius:2px;transition:width .5s ease}
.streaming-row{display:flex;flex-wrap:wrap;align-items:center;gap:5px;margin-top:2px}
.streaming-label{font-size:10px;color:var(--dim);font-weight:600;flex-shrink:0}
.platform-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;color:#fff;white-space:nowrap}
.action-btns{display:flex;flex-wrap:wrap;gap:4px;margin-top:auto;padding-top:4px}
.action-btn{flex:1;min-width:52px;padding:6px 4px;background:#1a1a1a;border:1px solid var(--border);
  color:var(--muted);border-radius:7px;font-size:11px;font-weight:600;text-align:center}
.action-btn:hover{background:#222;color:var(--text);border-color:#444}
.action-btn.liked{background:rgba(239,68,68,.18);border-color:#ef4444;color:#ef4444}
.action-btn.watched{background:rgba(34,197,94,.18);border-color:#22c55e;color:#22c55e}
.action-btn.disliked{background:rgba(100,116,139,.18);border-color:#64748b;color:#64748b}
.action-btn.skipped{background:rgba(234,179,8,.18);border-color:#eab308;color:#eab308}
.action-btn.saved{background:rgba(59,130,246,.18);border-color:#3b82f6;color:#3b82f6}
#rec-basis{font-size:13px;color:var(--muted);margin-bottom:18px;min-height:20px}
.refresh-btn{padding:9px 18px;background:#1a1a1a;border:1px solid var(--border);color:var(--muted);
  border-radius:9px;font-size:13px;font-weight:600;display:inline-flex;align-items:center;gap:6px}
.refresh-btn:hover{border-color:#444;color:var(--text)}

/* ── SPINNER ──────────────────────────────────────────────────────────────── */
.spinner{display:flex;align-items:center;justify-content:center;gap:12px;padding:64px;color:var(--muted);font-size:14px}
.spin-ring{width:22px;height:22px;border:2.5px solid #2a2a2a;border-top-color:var(--red);
  border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-state{text-align:center;padding:64px 32px;color:var(--muted)}
.empty-state .icon{font-size:48px;margin-bottom:14px}

/* ── FRIENDS / PROFILE ────────────────────────────────────────────────────── */
.friends-search{display:flex;gap:8px;margin-bottom:18px}
.friends-input{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:9px;
  padding:11px 14px;color:var(--text);font-size:14px}
.friends-input:focus{border-color:var(--blue)}
.user-row{display:flex;align-items:center;gap:10px;padding:12px 14px;
  background:var(--bg3);border-radius:9px;border:1px solid var(--border);margin-bottom:8px}
.user-avatar{width:36px;height:36px;border-radius:50%;background:var(--red);
  display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;flex-shrink:0}
.user-name{font-weight:600;font-size:14px;flex:1}
.btn-sm{padding:6px 13px;background:var(--bg4);border:1px solid var(--border);
  color:var(--muted);border-radius:7px;font-size:12px;font-weight:600}
.btn-sm:hover{border-color:#555;color:var(--text)}
.taste-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px}
.taste-item{background:var(--bg3);border-radius:10px;padding:14px;border:1px solid var(--border)}
.taste-label{font-size:13px;font-weight:700;margin-bottom:8px}
.taste-bar-bg{height:6px;background:#2a2a2a;border-radius:3px;overflow:hidden}
.taste-bar{height:6px;background:var(--red);border-radius:3px;transition:width .5s ease}

/* ── TOAST ────────────────────────────────────────────────────────────────── */
#toast{display:none;position:fixed;bottom:24px;right:24px;z-index:9999;
  background:#1a1a1a;border-left:4px solid var(--red);border-radius:8px;
  padding:13px 18px;font-size:13px;font-weight:600;color:var(--text);
  box-shadow:0 8px 32px rgba(0,0,0,.7);animation:toastIn .3s ease;max-width:280px}
@keyframes toastIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}

/* ═══════════════════════════════════════════════════════════════════════════
   MOVIE DETAIL MODAL
═══════════════════════════════════════════════════════════════════════════ */
#movie-modal{
  display:none;position:fixed;inset:0;z-index:500;
  align-items:center;justify-content:center;
  background:rgba(0,0,0,.85);backdrop-filter:blur(8px);
  padding:20px;animation:fadeIn .2s ease;
}
.modal-box{
  background:#111;border:1px solid #2a2a2a;border-radius:18px;
  width:100%;max-width:820px;max-height:90vh;overflow-y:auto;
  position:relative;box-shadow:0 32px 80px rgba(0,0,0,.9);
  animation:modalUp .25s ease;
}
@keyframes modalUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:none}}
.modal-close{
  position:sticky;top:0;float:right;z-index:10;
  margin:14px 14px 0 0;
  width:34px;height:34px;border-radius:50%;
  background:rgba(30,30,30,.95);border:1px solid #333;
  color:#aaa;font-size:18px;line-height:1;
  display:flex;align-items:center;justify-content:center;
}
.modal-close:hover{background:#222;color:#fff}

/* Hero banner with blurred poster bg */
.modal-hero{
  position:relative;height:220px;overflow:hidden;border-radius:18px 18px 0 0;
  display:flex;align-items:flex-end;flex-shrink:0;
}
.modal-hero-bg{
  position:absolute;inset:0;background-size:cover;background-position:center top;
  filter:blur(18px) brightness(.35);transform:scale(1.1);
}
.modal-hero-poster{
  position:relative;z-index:1;width:130px;height:190px;object-fit:cover;
  border-radius:10px;margin:0 0 -50px 28px;
  box-shadow:0 16px 48px rgba(0,0,0,.8);border:2px solid #2a2a2a;flex-shrink:0;
}
.modal-hero-titles{
  position:relative;z-index:1;padding:0 24px 16px 20px;flex:1;min-width:0;
}
.modal-hero-title{font-size:26px;font-weight:900;line-height:1.15;
  text-shadow:0 2px 12px rgba(0,0,0,.8);margin-bottom:6px}
.modal-hero-meta{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.modal-badge{padding:3px 10px;border-radius:6px;font-size:11px;font-weight:700;
  background:rgba(255,255,255,.12);color:#ddd;border:1px solid rgba(255,255,255,.15)}
.modal-badge.imdb{background:rgba(245,197,24,.15);color:#f5c518;border-color:rgba(245,197,24,.3)}
.modal-badge.rated{background:rgba(100,116,139,.2);color:#94a3b8}
.modal-badge.type{background:rgba(59,130,246,.2);color:#60a5fa}

/* Body */
.modal-body{padding:64px 28px 28px}
.modal-plot{font-size:15px;color:#bbb;line-height:1.75;margin-bottom:24px}
.modal-row{display:flex;gap:32px;flex-wrap:wrap;margin-bottom:20px}
.modal-col{flex:1;min-width:200px}
.modal-label{font-size:10px;font-weight:800;text-transform:uppercase;
  letter-spacing:1.5px;color:#555;margin-bottom:6px}
.modal-value{font-size:14px;color:#ccc;line-height:1.6}
.modal-genres{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:22px}
.modal-genre-tag{padding:5px 14px;border-radius:20px;font-size:12px;font-weight:700;
  background:rgba(229,9,20,.15);color:var(--red);border:1px solid rgba(229,9,20,.25)}
.modal-streaming{margin-bottom:24px}
.modal-streaming-title{font-size:10px;font-weight:800;text-transform:uppercase;
  letter-spacing:1.5px;color:#555;margin-bottom:10px}
.modal-platforms{display:flex;flex-wrap:wrap;gap:8px}
.modal-platform{padding:7px 16px;border-radius:8px;font-size:13px;font-weight:700;color:#fff}
.modal-actions{display:flex;flex-wrap:wrap;gap:8px;padding-top:20px;border-top:1px solid #1e1e1e}
.modal-action-btn{flex:1;min-width:100px;padding:11px 8px;border-radius:9px;font-size:13px;
  font-weight:700;background:#1a1a1a;border:1px solid #2a2a2a;color:#888;text-align:center}
.modal-action-btn:hover{border-color:#444;color:#fff}
.modal-action-btn.liked{background:rgba(239,68,68,.18);border-color:#ef4444;color:#ef4444}
.modal-action-btn.watched{background:rgba(34,197,94,.18);border-color:#22c55e;color:#22c55e}
.modal-action-btn.disliked{background:rgba(100,116,139,.18);border-color:#64748b;color:#64748b}
.modal-action-btn.skipped{background:rgba(234,179,8,.18);border-color:#eab308;color:#eab308}
.modal-action-btn.saved{background:rgba(59,130,246,.18);border-color:#3b82f6;color:#3b82f6}
.modal-ratings-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:22px}
.modal-rating-box{background:#1a1a1a;border:1px solid #222;border-radius:10px;
  padding:12px 16px;text-align:center;min-width:90px}
.modal-rating-val{font-size:20px;font-weight:800;color:#f5c518}
.modal-rating-src{font-size:10px;color:#555;margin-top:3px;text-transform:uppercase;letter-spacing:.5px}

@media(max-width:600px){
  .movie-grid{grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:10px}
  .navbar{padding:0 10px;gap:1px}
  .nav-link{padding:6px 8px;font-size:11px}
  .view{padding:14px 10px}
  .modal-hero{height:160px}
  .modal-hero-poster{width:90px;height:135px;margin-bottom:-40px}
  .modal-hero-title{font-size:18px}
  .modal-body{padding:50px 16px 20px}
  .modal-box{border-radius:14px}
}
</style>
</head>
<body>

<!-- ── AUTH ────────────────────────────────────────────────────────────────── -->
<div id="auth-screen">
  <div class="auth-box">
    <div class="auth-logo">🎬 CINEMATCH</div>
    <div class="auth-sub">Your personal movie recommendation engine</div>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">Sign In</button>
      <button class="auth-tab"        onclick="switchTab('signup')">Sign Up</button>
    </div>
    <div id="login-form" class="auth-form" style="display:block">
      <div class="field-label">Email</div>
      <input id="login-email"    class="field-input" type="email"    placeholder="you@email.com"    onkeydown="if(event.key==='Enter')login()"/>
      <div class="field-label">Password</div>
      <input id="login-password" class="field-input" type="password" placeholder="••••••••"         onkeydown="if(event.key==='Enter')login()"/>
      <div id="login-error" class="auth-error"></div>
      <button class="auth-btn" onclick="login()">Sign In →</button>
    </div>
    <div id="signup-form" class="auth-form">
      <div class="field-label">Username</div>
      <input id="signup-username" class="field-input" type="text"     placeholder="your_username"/>
      <div class="field-label">Email</div>
      <input id="signup-email"    class="field-input" type="email"    placeholder="you@email.com"/>
      <div class="field-label">Password</div>
      <input id="signup-password" class="field-input" type="password" placeholder="min 4 chars"/>
      <div class="field-label">Confirm Password</div>
      <input id="signup-confirm"  class="field-input" type="password" placeholder="repeat password" onkeydown="if(event.key==='Enter')register()"/>
      <div id="signup-error" class="auth-error"></div>
      <button class="auth-btn" onclick="register()">Create Account →</button>
    </div>
    <div class="auth-switch">No account? <span onclick="switchTab('signup')">Sign Up</span></div>
  </div>
</div>

<!-- ── APP ─────────────────────────────────────────────────────────────────── -->
<div id="app-screen">
  <nav class="navbar">
    <div class="nav-logo">🎬 CINEMATCH</div>
    <button class="nav-link active" onclick="showView('recommendations')">✦ For You</button>
    <button class="nav-link"        onclick="showView('search')">🔍 Search</button>
    <button class="nav-link"        onclick="showView('mylist')">📋 My List</button>
    <button class="nav-link"        onclick="showView('friends')">👥 Friends</button>
    <button class="nav-link"        onclick="showView('profile')">👤 Profile</button>
    <div class="nav-right">
      <div class="nav-user">
        <div class="nav-avatar" id="nav-avatar">?</div>
        <span id="nav-username"></span>
      </div>
      <button class="nav-logout" onclick="logout()">Sign out</button>
    </div>
  </nav>

  <div id="view-recommendations" class="view active">
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:8px">
      <div class="view-title">✦ Recommended <span>For You</span></div>
      <button class="refresh-btn" onclick="loadRecommendations()">🔄 Refresh</button>
    </div>
    <div id="rec-basis"></div>
    <div id="rec-results"><div class="spinner"><div class="spin-ring"></div> Loading…</div></div>
  </div>

  <div id="view-search" class="view">
    <div class="view-title" style="margin-bottom:16px">🔍 Search <span>Movies</span></div>
    <div class="search-bar">
      <input id="search-input" class="search-input" type="text" placeholder="Search any movie or show…" onkeydown="if(event.key==='Enter')searchMovies()"/>
      <button class="search-btn" onclick="searchMovies()">Search</button>
    </div>
    <div id="search-results"></div>
  </div>

  <div id="view-mylist" class="view">
    <div class="view-title" style="margin-bottom:20px">📋 My <span>List</span></div>
    <div id="mylist-content"></div>
  </div>

  <div id="view-friends" class="view">
    <div class="view-title" style="margin-bottom:16px">👥 <span>Friends</span></div>
    <div class="friends-search">
      <input id="user-search-input" class="friends-input" type="text" placeholder="Search users by username…" onkeydown="if(event.key==='Enter')searchUsers()"/>
      <button class="search-btn" onclick="searchUsers()">Find</button>
    </div>
    <div id="user-search-results"></div>
    <div id="friend-requests-section"></div>
    <div class="section-title">YOUR FRIENDS</div>
    <div id="friends-list"></div>
  </div>

  <div id="view-profile" class="view">
    <div class="view-title" style="margin-bottom:20px">👤 <span>Profile</span></div>
    <div id="profile-content"></div>
  </div>
</div>

<!-- ══ MOVIE DETAIL MODAL ══════════════════════════════════════════════════ -->
<div id="movie-modal" onclick="handleModalClick(event)">
  <div class="modal-box" id="modal-box">
    <button class="modal-close" onclick="closeMovieModal()">✕</button>
    <div id="modal-content">
      <div class="spinner" style="min-height:300px"><div class="spin-ring"></div> Loading…</div>
    </div>
  </div>
</div>

<script>
function showApp() {
  document.getElementById("auth-screen").style.display = "none"
  document.getElementById("app-screen").style.display  = "block"
  document.getElementById("nav-username").textContent  = username
  document.getElementById("nav-avatar").textContent    = (username||"?")[0].toUpperCase()
  loadMyBehavior().then(() => loadRecommendations())
}
// Close modal when clicking outside the box
function handleModalClick(e) {
  if (e.target === document.getElementById("movie-modal")) closeMovieModal()
}
// Close on Escape key
document.addEventListener("keydown", e => { if (e.key === "Escape") closeMovieModal() })
</script>
<script src="app.js"></script>
